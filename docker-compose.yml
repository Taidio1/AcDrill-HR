services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Wartości NEXT_PUBLIC_* są potrzebne podczas BUILDU.
        # Pobierane są z pliku .env (lub środowiska powłoki).
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    image: acdrill-hr-next
    container_name: acdrill-hr-next
    restart: unless-stopped
    # HTTPS zapewnia proxy mikr.usa – aplikacja serwuje zwykły HTTP na :3000.
    # Subdomenę w panelu mikr.us kieruj na port 3000 (checkbox HTTPS odznaczony).
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Sekret używany po stronie serwera (API admina) – w RUNTIME, nie w buildzie.
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
